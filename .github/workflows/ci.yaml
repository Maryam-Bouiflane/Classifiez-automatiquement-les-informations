name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run tests
        run: poetry run pytest

      # Clean ancien modèle + threshold
      - name: Clean old artifacts
        run: rm -rf models

      # Training → doit créer model.pkl + threshold.pkl
      - name: Run training
        run: poetry run python main.py

      # Sécurité : vérifier que les fichiers existent
      - name: Check artifacts
        run: |
          ls -R models
          test -f models/model.pkl
          test -f models/threshold.pkl

      # Upload pour CD
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifacts
          path: models/